<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #0b0b0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #0b0b0f; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%;">
                    <!-- Logo / Brand -->
                    <tr>
                        <td align="center" style="padding-bottom: 32px;">
                            <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #7c5cff, #6344e0); border-radius: 14px; display: inline-block; text-align: center; line-height: 56px;">
                                <span style="font-size: 28px; font-weight: 800; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">S</span>
                            </div>
                        </td>
                    </tr>

                    <!-- Card -->
                    <tr>
                        <td style="background-color: #16161d; border: 1px solid #2a2a36; border-radius: 16px; padding: 40px 32px;">
                            <!-- Heading -->
                            <h1 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: #f5f5f7; text-align: center;">
                                Reset Your Password
                            </h1>
                            <p style="margin: 0 0 28px 0; font-size: 15px; color: #9a9aae; text-align: center; line-height: 1.5;">
                                We received a request to reset the password for your Shift account. Tap the button below to choose a new password.
                            </p>

                            <!-- Button -->
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding: 4px 0 28px 0;">
                                        <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; background: linear-gradient(135deg, #7c5cff, #6344e0); color: #ffffff; font-size: 16px; font-weight: 600; text-decoration: none; padding: 14px 40px; border-radius: 12px;">
                                            Reset Password
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <!-- Divider -->
                            <div style="border-top: 1px solid #2a2a36; margin: 0 0 20px 0;"></div>

                            <!-- Footer text -->
                            <p style="margin: 0; font-size: 13px; color: #6a6a7e; line-height: 1.6; text-align: center;">
                                If you didn't request this, you can safely ignore this email. This link will expire in 24 hours.
                            </p>
                        </td>
                    </tr>

                    <!-- Bottom branding -->
                    <tr>
                        <td align="center" style="padding-top: 24px;">
                            <p style="margin: 0; font-size: 12px; color: #4a4a5e;">
                                Shift Workout Tracker
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
